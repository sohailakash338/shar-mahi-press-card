<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Multan Express - Press Card</title>
<style>
body{margin:0; padding:20px; background:#f0f2f5; font-family:'Segoe UI',Arial; display:flex; justify-content:center; align-items:center; min-height:100vh}
.card{width:400px; background:white; border-radius:15px; border:3px solid #002366; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.top-header{background:#002366; color:white; text-align:center; padding:12px; font-size:18px; font-weight:bold; letter-spacing:1px}
.header{background:linear-gradient(135deg, #002366 0%, #0047ab 100%); color:white; text-align:center; padding:18px}
.header h1{margin:0; font-size:26px}
.header h1 span{color:#d40000; font-size:28px; font-weight:900}
.urdu{font-size:20px; margin-top:6px; font-family:'Jameel Noori Nastaleeq',serif}
.photo-section{padding:18px; text-align:center; background:#f8f9fa}
.photo{width:180px; height:220px; border:4px solid #002366; border-radius:10px; object-fit:cover; box-shadow:0 4px 10px rgba(0,0,0,0.2)}
.valid{color:#d40000; font-weight:bold; font-size:16px; text-align:center; margin:12px 0}
.info-table{width:100%; border-collapse:collapse; margin-bottom:15px}
.info-table td{padding:12px 15px; border-bottom:1px solid #ddd; font-size:15px}
.info-table td:first-child{background:#002366; color:white; font-weight:bold; width:42%}
.sign-section{padding:15px 20px; text-align:left; border-top:2px solid #ddd}
.ceo-name{font-size:18px; font-weight:bold; color:#d40000; margin:0}
.ceo-title{font-size:13px; color:#333; margin:2px 0 0}
.footer-section{display:flex; justify-content:flex-end; padding:0 20px 15px}
.qr-section img{width:90px; height:90px}
.verified{background:#28a745; color:white; text-align:center; padding:14px; font-weight:bold; font-size:17px; letter-spacing:1px}
</style>
</head>
<body>
<div class="card">
<div class="top-header">DAILY MULTAN EXPRESS VERIFICATION PORTAL</div>
<div class="header">
<h1>DAILY <span>MULTAN EXPRESS</span></h1>
<div class="urdu">سچ کی رفتار</div>
</div>
<div class="photo-section">
<img src="photo.jpg" alt="Shar Mahi Photo" class="photo">
</div>
<div class="valid">Valid Till - 25/05/2027</div>
<table class="info-table">
<tr><td>NAME :</td><td>Shar Mahi</td></tr>
<tr><td>CNIC :</td><td>33106-0499963-7</td></tr>
<tr><td>DESIGNATION :</td><td>DISTRICT REPORTER</td></tr>
<tr><td>PRESS CARD NO :</td><td>RME 100-05-26</td></tr>
<tr><td>ISSUE DATE :</td><td>25/05/2026</td></tr>
<tr><td>PHONE NO :</td><td>03151759559</td></tr>
</table>
<div class="sign-section">
<p class="ceo-name">RANA SOHAIL NAWAZ</p>
<p class="ceo-title">CEO SIGN</p>
</div>
<div class="footer-section">
<div class="qr-section">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=https://sohailakash338.github.io/shar-mahi-press-card/" alt="QR Code">
</div>
</div>
<div class="verified">THIS CARD IS VERIFIED</div>
</div>
</body>
</html>
